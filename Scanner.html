<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="description" content="Scanner Interface for Digital ID">
  <?!= include('Style'); ?>
  <?!= include('Html5QrcodeLib'); ?>
  <style>
    #viewfinder-container > img,
    #viewfinder-container > div[style] {
      display: none !important;
    }
    #viewfinder-container video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      border-radius: 0 !important;
    }
    .viewfinder {
      position: relative;
      overflow: hidden;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.warning { background: var(--amber); color: #000; }
    .toast.error   { background: var(--red);   color: #fff; }
    .full-screen-error {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      text-align: center;
      padding: 2rem;
    }
    .full-screen-error.hidden { display: none; }

    /* Loading overlay shown until camera starts */
    #loadingOverlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 40;
      gap: 1rem;
    }
    #loadingOverlay.hidden { display: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div style="position:absolute; top:1rem; right:1rem; z-index:100;">
  <a href="?action=admin" target="_blank"
    style="color:var(--text-muted); font-size:0.8rem; text-decoration:none; opacity:0.5;">Admin</a>
</div>

<div class="scanner-container">

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="color:var(--text-muted); font-size:0.9rem;">Starting camera...</p>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="app-brand">DigitalID</div>
    <div class="clock-display mono" id="live-clock">--</div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span id="statusText">Starting...</span>
    </div>
  </div>

  <!-- Camera Error State -->
  <div id="cameraErrorState" class="full-screen-error hidden">
    <div style="width:64px; height:64px; border: 2px solid var(--red); border-radius: 8px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom: 1rem; color: var(--red); font-weight: bold; font-size: 2rem;">!</div>
    <h2 style="margin-bottom: 1rem;">Camera Access Required</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">
      Please allow camera permissions to use the scanner.
    </p>
    <button class="btn-primary" style="max-width: 200px;" onclick="location.reload()">Retry</button>
  </div>

  <!-- Viewfinder -->
  <div class="viewfinder-container">
    <div class="viewfinder" id="viewfinder-container">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
      <div class="scan-line"></div>
    </div>

    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">
      Align QR code within frame
    </p>
    <a href="?action=register"
      style="display:block; margin-top:1rem; color:var(--text-muted); font-size:0.8rem; text-decoration:none;">
      &larr; Back to Register
    </a>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.5rem;">
      <div>
        <h3 id="resName" style="font-size:1.3rem; margin-bottom:0.2rem;">--</h3>
        <p id="resRole" style="color:var(--text-muted); font-size:0.85rem;">--</p>
      </div>
      <span class="badge" id="resStatusBadge">--</span>
    </div>
    <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border-color);">
      <p class="mono" id="resId"   style="color:var(--primary); font-size:0.9rem; margin-bottom:0.3rem;">--</p>
      <p class="mono" id="resTime" style="color:var(--text-muted); font-size:0.8rem;">--</p>
    </div>
  </div>

  <!-- Logs Strip -->
  <div class="logs-strip" id="logsStrip"></div>
</div>

<div class="toast" id="toastBox"></div>

<script>
  // ── Clock ──
  function updateClock() {
    const now      = new Date();
    const datePart = now.toLocaleDateString('en-IN', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    const timePart = now.toTimeString().split(' ')[0];
    document.getElementById('live-clock').textContent = `${datePart} · ${timePart}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Toast ──
  const toastBox = document.getElementById('toastBox');
  function showToast(message, type) {
    toastBox.textContent = message;
    toastBox.className   = `toast show ${type}`;
    setTimeout(() => toastBox.classList.remove('show'), 2000);
  }

  // ── Result Card ──
  const resultCard = document.getElementById('resultCard');
  let hideTimeout;
  let scanCooldown = false;

  function showResultCard(status, data) {
    const { name, role, userId, timestamp, message } = data;

    document.getElementById('resName').textContent = name  || "Unknown";
    document.getElementById('resRole').textContent = role  || "N/A";
    document.getElementById('resId').textContent   = userId || "--";
    document.getElementById('resTime').textContent = timestamp
      ? new Date(timestamp).toLocaleTimeString() : "--";

    const badge       = document.getElementById('resStatusBadge');
    badge.textContent = status;
    badge.className   = `badge ${status.toLowerCase()}`;

    if (status === 'INVALID') {
      document.getElementById('resName').textContent = message || "Scan Error";
      document.getElementById('resRole').textContent = "";
      document.getElementById('resId').textContent   = "";
    }

    resultCard.className = `result-card status-${status.toLowerCase()}`;
    resultCard.classList.add('show');

    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      resultCard.classList.remove('show');
      scanCooldown = false;
    }, 3000);
  }

  // ── QR Decoder ──
  function decodeQRPayload(rawString) {
    try {
      const payload  = JSON.parse(rawString);
      const required = ['userId', 'name', 'role', 'issued'];
      for (const field of required) {
        if (!payload[field]) return { valid: false, reason: "Incomplete QR data" };
      }
      const idPattern = /^ANT-\d{8}-[A-Z0-9]{4}$/;
      if (!idPattern.test(payload.userId)) {
        return { valid: false, reason: "Invalid ID format" };
      }
      const daysDiff = (new Date() - new Date(payload.issued)) / (1000 * 60 * 60 * 24);
      if (daysDiff > 365) {
        return { valid: false, reason: "QR code has expired" };
      }
      return { valid: true, payload };
    } catch (e) {
      return { valid: false, reason: "Unreadable QR code" };
    }
  }

  // ── Scan Handler ──
  function onScanSuccess(decodedText) {
    if (scanCooldown) return;
    scanCooldown = true;

    const decoded = decodeQRPayload(decodedText);
    if (!decoded.valid) {
      showResultCard('INVALID', { message: decoded.reason });
      return;
    }

    const payload  = decoded.payload;
    payload.action = 'scan';

    google.script.run
      .withSuccessHandler(function(data) {
        if (data.status === 'DUPLICATE') {
          showToast("Already scanned. Please wait.", "warning");
          setTimeout(() => { scanCooldown = false; }, 2000);
        } else if (data.status === 'INVALID') {
          showResultCard('INVALID', { message: data.message });
        } else {
          showResultCard(data.status, data);
          prependLogToStrip(data);
        }
      })
      .withFailureHandler(function(err) {
        console.error(err);
        showResultCard('INVALID', { message: "Server Error" });
      })
      .scanFromClient(payload);
  }

  function onScanError() { /* intentionally silent */ }

  // ── Init Camera ──
  // Wait for DOM + library to be fully ready
  window.addEventListener('load', function() {
    if (typeof Html5Qrcode === 'undefined') {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('cameraErrorState').classList.remove('hidden');
      return;
    }

    const scanner = new Html5Qrcode("viewfinder-container");

    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.0 },
      onScanSuccess,
      onScanError
    )
    .then(function() {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('statusText').textContent = 'Ready to Scan';
    })
    .catch(function(err) {
      console.error("Camera start failed:", err);
      document.getElementById('loadingOverlay').classList.add('hidden');
      const errStr = String(err);
      if (errStr.includes("NotAllowedError") || errStr.includes("permission") || errStr.includes("Permission")) {
        document.getElementById('cameraErrorState').classList.remove('hidden');
      } else {
        document.getElementById('statusText').textContent = 'Camera Error';
        showToast("Camera error. Please refresh.", "error");
      }
    });
  });

  // ── Logs Strip ──
  const logsStrip = document.getElementById('logsStrip');

  function prependLogToStrip(log) {
    const timeStr = new Date(log.timestamp || log.scannedAt)
      .toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const pill       = document.createElement('div');
    pill.className   = 'log-pill';
    pill.innerHTML   = `
      <span style="font-weight:700">${log.name}</span>
      <span class="badge ${log.status.toLowerCase()}"
        style="font-size:0.6rem; padding:0.1rem 0.4rem;">${log.status}</span>
      <span class="mono" style="color:var(--text-muted); font-size:0.75rem;">${timeStr}</span>
    `;
    logsStrip.prepend(pill);
  }

  function renderLogs(logs) {
    logsStrip.innerHTML = '';
    [...logs].reverse().forEach(log => prependLogToStrip(log));
  }

  function fetchLogs() {
    google.script.run
      .withSuccessHandler(function(logs) {
        if (logs && logs.length) renderLogs(logs);
      })
      .withFailureHandler(function(err) {
        console.error("Failed to fetch logs", err);
      })
      .getLogsFromClient();
  }

  setInterval(fetchLogs, 5000);
  fetchLogs();
</script>

</body>
</html>
